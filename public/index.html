<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>ETA</title>
  <meta name="theme-color" content="#F3FADE"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.css">
  <script src="/scripts/state.js" defer></script>
  <script src="/scripts/navigation.js" defer></script>
  <script src="/scripts/selections.js" defer></script>
  <script src="/scripts/app.js" defer></script>
</head>
<body>
<div class="app" id="app">
<section id="splash" class="screen active splashOnly" onclick="show('onboard1')" style="cursor:pointer;">
  <img class="shot" src="/assets/splash.png">
</section>

<section id="onboard1" class="screen" onclick="show('onboard2')" style="cursor:pointer;">
  <img class="shot" src="/assets/onboard1.png">
</section>

<section id="onboard2" class="screen" onclick="show('onboard3')" style="cursor:pointer;">
  <img class="shot" src="/assets/onboard2.png">
</section>

<section id="onboard3" class="screen" onclick="show('onboard4')" style="cursor:pointer;">
  <img class="shot" src="/assets/onboard3.png">
</section>

<section id="onboard4" class="screen" onclick="show('calculate')" style="cursor:pointer;">
  <img class="shot" src="/assets/onboard4.png">
</section>

<section id="calculate" class="screen scroll calcScreen">
  <div class="calcContent">
    <h1>Plan Your Trip</h1>
    <p class="subtitle">Tell us about your flight details</p>

    <div class="card lime">
      <h2>Flight Details</h2>
      <div class="fieldRow">
        <input id="flightTime" type="time" value="19:30">
        <input placeholder="Flight Type">
      </div>
    </div>

    <div class="card dark">
      <h2>Airport & Terminal</h2>
      <div class="fieldRow">
        <input id="airportInput" value="JFK">
        <input placeholder="Terminal B">
      </div>
    </div>

    <div class="card">
      <h2>Starting Location</h2>
      <input class="full" value="68 Berkeley Place, Brooklyn NY 11217">
    </div>

<div class="card">
  <h2>Transportation</h2>

  <div class="chipGroup" data-group="transport">
    <button class="chip active">Rideshare</button>
    <button class="chip">Drive & park</button>
    <button class="chip">Transit</button>
    <button class="chip">Drop-off</button>
  </div>
</div>

<div class="card">
  <h2>Luggage</h2>

  <div class="chipGroup" data-group="luggage">
    <button class="chip active">Carry-on only</button>
    <button class="chip">Checking bags</button>
    <button class="chip">Bag drop</button>
  </div>
</div>

<div class="card">
  <h2>Security Status</h2>

  <div class="chipGroup" data-group="security">
    <button class="chip">CLEAR + PreCheck</button>
    <button class="chip active">PreCheck</button>
    <button class="chip">Standard</button>
  </div>

</div>

<div class="card">
  <h2>Before Boarding</h2>

  <div class="chipGroup" data-group="boarding">
    <button class="chip">Lounge</button>
    <button class="chip">Grab food</button>
    <button class="chip active">Head to gate</button>
  </div>

</div>

 <div class="card lime">
    <h2>Your Travel Style</h2>

 <div class="chipGroup" data-group="style">
    <button class="chip">Cut it close</button>
    <button class="chip active">Balanced</button>
    <button class="chip">No rush</button>
 </div>

</div>

<button class="ctaButton" onclick="calculateETA()">
  Calculate My ETA
</button>

</section>

<section id="loading" class="screen"><img class="shot" src="/assets/loading.png"></section>
<section id="result" class="screen scroll">
  <img class="shot resultShot" src="/assets/result.png">

    <div class="resultDynamic">
    <div class="resultLabel">Leave by</div>
    <div id="dynamicLeaveBy" class="resultTime">5:42 PM</div>
    <div id="dynamicSummary" class="resultSummary"></div>
    </div>
  <button
    class="editHotspot"
    onclick="show('calculate')"
    aria-label="Edit">
  </button>
</section>
<section id="trips" class="screen scroll"><img class="shot" src="/assets/trips.png"></section>
<section id="airports" class="screen"><img class="shot" src="/assets/airports.png"></section>
<section id="profile" class="screen"><img class="shot" src="/assets/profile.png"></section>
<section id="settings" class="screen"><img class="shot" src="/assets/settings.png"></section>
<div class="bottomNav">
<button class="active" data-to="calculate">
  <div class="icon">
    <svg viewBox="0 0 24 24">
      <rect x="4" y="2" width="16" height="20" rx="2"></rect>
      <line x1="8" y1="6" x2="16" y2="6"></line>
      <line x1="8" y1="10" x2="10" y2="10"></line>
      <line x1="14" y1="10" x2="16" y2="10"></line>
      <line x1="8" y1="14" x2="10" y2="14"></line>
      <line x1="14" y1="14" x2="16" y2="14"></line>
    </svg>
  </div>
  <span>Calculate</span>
</button>

  <button data-to="trips">
    <div class="icon">
    <svg viewBox="0 0 24 24">
        <rect x="3" y="7" width="18" height="13" rx="2"></rect>
        <path d="M8 7V5a4 4 0 0 1 8 0v2"></path>
    </svg>
    </div>
    <span>Trips</span>
  </button>

<button data-to="airports">
  <div class="icon">
    <svg viewBox="0 0 24 24">
        <path d="M22 2L11 13"></path>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
    </svg>
  </div>
  <span>Airports</span>
</button>

<button data-to="profile">
  <div class="icon">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4"></circle>
      <path d="M4 20 C4 16 8 14 12 14 C16 14 20 16 20 20"></path>
    </svg>
  </div>
  <span>Profile</span>
</button>

  <button data-to="settings">
    <div class="icon">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15A1.65 1.65 0 0 0 19.73 16.82L19.79 16.88A2 2 0 1 1 16.96 19.71L16.9 19.65A1.65 1.65 0 0 0 15.08 19.32A1.65 1.65 0 0 0 14 20.85V21A2 2 0 1 1 10 21V20.85A1.65 1.65 0 0 0 8.92 19.32A1.65 1.65 0 0 0 7.1 19.65L7.04 19.71A2 2 0 1 1 4.21 16.88L4.27 16.82A1.65 1.65 0 0 0 4.6 15A1.65 1.65 0 0 0 3.07 14H3A2 2 0 1 1 3 10H3.07A1.65 1.65 0 0 0 4.6 9A1.65 1.65 0 0 0 4.27 7.18L4.21 7.12A2 2 0 1 1 7.04 4.29L7.1 4.35A1.65 1.65 0 0 0 8.92 4.68A1.65 1.65 0 0 0 10 3.15V3A2 2 0 1 1 14 3V3.15A1.65 1.65 0 0 0 15.08 4.68A1.65 1.65 0 0 0 16.9 4.35L16.96 4.29A2 2 0 1 1 19.79 7.12L19.73 7.18A1.65 1.65 0 0 0 19.4 9A1.65 1.65 0 0 0 20.93 10H21A2 2 0 1 1 21 14H20.93A1.65 1.65 0 0 0 19.4 15Z"></path>
        </svg>
    </div>
    <span>Settings</span>
  </button>
</div>
</body>
</html>
