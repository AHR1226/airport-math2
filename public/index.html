<section id="calculate" class="screen scroll calcScreen">
  <div class="calcContent">

    <div class="card lime">

 <div class="chipGroup" data-group="style">

 </div>

            <path d="M19.4 15A1.65 1.65 0 0 0 19.73 16.82L19.79 16.88A2 2 0 1 1 16.96 19.71L16.9 19.65A1.65 1.65 0 0 0 15.08 19.32A1.65 1.65 0 0 0 14 20.85V21A2 2 0 1 1 10 21V20.85A1.65 1.65 0 0 0 8.92 19.32A1.65 1.65 0 0 0 7.1 19.65L7.04 19.71A2 2 0 1 1 4.21 16.88L4.27 16.82A1.65 1.65 0 0 0 4.6 15A1.65 1.65 0 0 0 3.07 14H3A2 2 0 1 1 3 10H3.07A1.65 1.65 0 0 0 4.6 9A1.65 1.65 0 0 0 4.27 7.18L4.21 7.12A2 2 0 1 1 7.04 4.29L7.1 4.35A1.65 1.65 0 0 0 8.92 4.68A1.65 1.65 0 0 0 10 3.15V3A2 2 0 1 1 14 3V3.15A1.65 1.65 0 0 0 15.08 4.68A1.65 1.65 0 0 0 16.9 4.35L16.96 4.29A2 2 0 1 1 19.79 7.12L19.73 7.18A1.65 1.65 0 0 0 19.4 9A1.65 1.65 0 0 0 20.93 10H21A2 2 0 1 1 21 14H20.93A1.65 1.65 0 0 0 19.4 15Z"></path>

<script>
const app = document.getElementById('app');
const screens = [...document.querySelectorAll('.screen')];

function show(id) {
  screens.forEach(s => {
    s.classList.toggle('active', s.id === id);
  });

  const hideNav = ['splash','onboard1','onboard2','onboard3','onboard4','loading'].includes(id);

  document.body.classList.toggle(
    'hideBottomNav',
    hideNav
  );

  document.querySelectorAll('.navTap').forEach(b => {
    b.style.display = hideNav ? 'none' : 'block';
  });

  document.querySelectorAll('.bottomNav button').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.to === id);
});
}

show('splash');
document.querySelectorAll('.bottomNav button').forEach(btn => {
  btn.addEventListener('click', () => {
    show(btn.getAttribute('data-to'));
  });
});

document.querySelector('.splashTap').onclick = () => show('onboard1');

document.querySelectorAll('.chipGroup').forEach(group => {
  const chips = group.querySelectorAll('.chip');

  chips.forEach(chip => {
    chip.onclick = () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    };
  });
});
document.querySelectorAll('.chipGroup .chip').forEach(chip => {
  chip.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();

    const group = this.closest('.chipGroup');
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
  });
});
function getActive(groupName) {
  const group = document.querySelector(`[data-group="${groupName}"]`);
  return group?.querySelector('.chip.active')?.textContent.trim() || '';
}

function minutesForSelection() {
  const transport = getActive('transport');
  const luggage = getActive('luggage');
  const security = getActive('security');
  const boarding = getActive('boarding');
  const style = getActive('style');

  let travel = 45;
  let airport = 35;
  let buffer = 15;

  if (transport === 'Transit') travel += 20;
  if (transport === 'Drive & park') travel += 15;
  if (transport === 'Drop-off') travel -= 5;

  if (luggage === 'Checking bags') airport += 25;
  if (luggage === 'Bag drop') airport += 15;

  if (security === 'Standard') airport += 25;
  if (security === 'CLEAR + PreCheck') airport -= 10;

  if (boarding === 'Lounge') airport += 35;
  if (boarding === 'Grab food') airport += 20;

  if (style === 'Cut it close') buffer -= 10;
  if (style === 'No rush') buffer += 25;

  return { travel, airport, buffer, total: travel + airport + buffer };
}

function formatTime(date) {
  return date.toLocaleTimeString([], {
    hour: 'numeric',
    minute: '2-digit'
  });
}

function calculateETA() {
  const flightTimeValue = document.getElementById('flightTime')?.value || '19:30';
  const [hours, minutes] = flightTimeValue.split(':').map(Number);

  const flight = new Date();
  flight.setHours(hours, minutes, 0, 0);

  const timing = minutesForSelection();
  const leave = new Date(flight.getTime() - timing.total * 60000);

  localStorage.setItem('etaResult', JSON.stringify({
    leaveBy: formatTime(leave),
    flightTime: formatTime(flight),
    airport: document.getElementById('airportInput')?.value || 'JFK',
    travel: timing.travel,
    airportTime: timing.airport,
    buffer: timing.buffer,
    total: timing.total,
    style: getActive('style')
  }));

  show('loading');

  setTimeout(() => {
    renderResult();
    show('result');
  }, 1200);
}

function renderResult() {
  const result = JSON.parse(localStorage.getItem('etaResult') || '{}');

  const leaveEl = document.getElementById('dynamicLeaveBy');
  const summaryEl = document.getElementById('dynamicSummary');

  if (leaveEl) leaveEl.textContent = result.leaveBy || '5:42 PM';

  if (summaryEl) {
    summaryEl.innerHTML = `
      <div>Flight: ${result.flightTime || '7:30 PM'} from ${result.airport || 'JFK'}</div>
      <div>Travel time: ${result.travel || 45} min</div>
      <div>Airport time: ${result.airportTime || 35} min</div>
      <div>Buffer: ${result.buffer || 15} min</div>
      <div>Total planning window: ${result.total || 95} min</div>
    `;
  }
}
document.querySelectorAll('.chipGroup .chip').forEach(chip => {
  chip.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();

    const group = this.closest('.chipGroup');
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
