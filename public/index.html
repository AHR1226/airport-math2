<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#DDE3C8;
}

.app{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

.screen{
  position:absolute;
  inset:0;
  display:none;
  overflow-y:auto;
  overflow-x:hidden;
}

.screen.active{
  display:block;
}

.shot{
  width:100%;
  height:auto;
  display:block;
}

button.tap{
  position:absolute;
  background:transparent;
  border:none;
  cursor:pointer;
  z-index:100;
}

.hideNav .bottom-nav{
  display:none;
}

.splashTap{
  left:12%;
  right:12%;
  top:79%;
  height:8%;
}

.hideNav .navTap{
  display:none;
}
</style></head><body><div class="app" id="app">
<section id="splash" class="screen active">
  <img class="shot" src="/assets/splash.png">
  <button class="tap" data-to="onboard1"></button>
</section>
<section id="onboard1" class="screen">
  <img class="shot" src="/assets/onboard1.png">
  <button class="tap" data-to="onboard2"></button>
</section>
<section id="onboard2" class="screen">
  <img class="shot" src="/assets/onboard2.png">
  <button class="tap" data-to="onboard3"></button>
</section>
<section id="onboard3" class="screen">
  <img class="shot" src="/assets/onboard3.png">
  <button class="tap" data-to="onboard4"></button>
</section>
<section id="onboard4" class="screen">
  <img class="shot" src="/assets/onboard4.png">
  <button class="tap" data-to="calculate"></button>
</section>
<section id="calculate" class="screen scroll" onclick="show('loading'); setTimeout(() => show('result'), 1200);" style="cursor:pointer;">
<section id="loading" class="screen"><img class="shot" src="/assets/loading.png"></section>
<section id="result" class="screen scroll"><img class="shot" src="/assets/result.png"><button class="tap" data-to="calculate" style="right:7%;top:5%;width:18%;height:6%"></button></section>
<section id="trips" class="screen scroll"><img class="shot" src="/assets/trips.png"></section>
<section id="airports" class="screen"><img class="shot" src="/assets/airports.png"></section>
<section id="profile" class="screen"><img class="shot" src="/assets/profile.png"></section>
<section id="settings" class="screen"><img class="shot" src="/assets/settings.png"></section>
<button class="tap navTap n0" data-to="calculate"></button><button class="tap navTap n1" data-to="trips"></button><button class="tap navTap n2" data-to="airports"></button><button class="tap navTap n3" data-to="profile"></button><button class="tap navTap n4" data-to="settings"></button><div class="note" id="note">Using live route API in backend</div></div>
<script>
const app = document.getElementById('app');
const screens = [...document.querySelectorAll('.screen')];

function show(id) {
  screens.forEach(s => {
    s.classList.toggle('active', s.id === id);
  });
}
document.querySelectorAll('[data-to]').forEach(button => {
  button.onclick = () => {
    show(button.dataset.to);
  };
});

document.getElementById('calculate').onclick = () => {
  show('loading');

  setTimeout(() => {
    show('result');
  }, 1200);
};
</script>
</body>
</html>
